# Unified CI: mock server + Python verifier + Go verifier + curl examples.
# Runs on every push and pull_request (all branches).
# Replaces integration-test.yml and verify-receipts.yml.
name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Block merge conflict markers
        run: |
          if git grep -nE '^(<<<<<<<|=======|>>>>>>>)' -- '*.py' '*.js' '*.yml' '*.md'; then
            echo "ERROR: merge conflict markers found in tracked sources"
            exit 1
          fi

      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            mock/requirements.txt

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install "requests>=2.31,<3"

      # Poll the health endpoint instead of sleeping a fixed amount so that slow
      # runners don't miss the window.  20 × 1 s ≈ 20 s ceiling.
      - name: Start mock server
        run: |
          nohup python mock/mock_server.py > /tmp/mock_rna.log 2>&1 &
          echo $! > /tmp/mock_rna.pid
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:8000/health > /dev/null 2>&1; then
              echo "Mock server ready (attempt $i)"
              break
            fi
            if [ "$i" -eq 20 ]; then
              echo "ERROR: mock server did not become ready within 20s"
              cat /tmp/mock_rna.log
              exit 1
            fi
            echo "Waiting for mock server ($i/20)..."
            sleep 1
          done
          curl -sf http://127.0.0.1:8000/health | python -m json.tool

      - name: Generate receipt
        run: |
          curl -s -X POST http://127.0.0.1:8000/mcp \
            -H "Content-Type: application/json" \
            -d @payloads/identity_verified.json > /tmp/receipt.json
          echo "Receipt generated:"
          python -m json.tool < /tmp/receipt.json

      - name: Verify receipt integrity (Python)
        run: python verifier/verify.py /tmp/receipt.json

      - name: Run curl examples
        run: |
          for script in examples/curl/*.sh; do
            echo "=== Running $script ==="
            RNA_BASE_URL=http://127.0.0.1:8000/mcp bash "$script"
          done

      - name: Session-based verify (Python)
        run: |
          python - <<'PYEOF'
          import json, pathlib, requests

          root = pathlib.Path(".")
          payload = json.loads(
              (root / "payloads" / "identity_verified.json").read_text(encoding="utf-8")
          )
          base = "http://127.0.0.1:8000/mcp"

          r = requests.post(base, json={
              "jsonrpc": "2.0", "id": "1", "method": "tools/call",
              "params": {"name": "submit_attestation", "arguments": {"payload": payload}},
          }, timeout=30)
          r.raise_for_status()
          rec = r.json()["result"]["receipt"]
          receipt_hash = rec["sha256"] + ":" + rec["blake3"]
          print(f"Submitted. Hash prefix: {receipt_hash[:16]}...")

          r2 = requests.post(base, json={
              "jsonrpc": "2.0", "id": "2", "method": "tools/call",
              "params": {"name": "verify_receipt", "arguments": {"receipt_hash": receipt_hash}},
          }, timeout=30)
          r2.raise_for_status()
          result = r2.json()["result"]
          assert result.get("valid") is True, f"Expected valid: True, got {result}"
          print("Session verify: PASSED")

          r3 = requests.post(base, json={
              "jsonrpc": "2.0", "id": "3", "method": "tools/call",
              "params": {"name": "verify_receipt",
                         "arguments": {"receipt_hash": "a" * 64 + ":" + "a" * 64}},
          }, timeout=30)
          r3.raise_for_status()
          result3 = r3.json()["result"]
          assert result3.get("valid") is False, f"Expected valid: False, got {result3}"
          print("Unknown hash returns False: PASSED")
          PYEOF

      - name: Verify all sample payloads
        run: |
          set -e
          for payload in payloads/*.json; do
            echo "Testing $payload..."
            curl -s -X POST http://127.0.0.1:8000/mcp \
              -H "Content-Type: application/json" \
              -d @"$payload" > /tmp/test_receipt.json
            python verifier/verify.py /tmp/test_receipt.json
          done

      - uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b # v5.4.0
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: examples/go/go.sum

      - name: Go mod download
        env:
          INQUIRO_ROOT: ${{ github.workspace }}
        run: cd examples/go && go mod download

      - name: Go verify receipt
        env:
          INQUIRO_ROOT: ${{ github.workspace }}
        run: |
          cd examples/go
          if ! go run ./cmd/verify-receipt /tmp/receipt.json; then
            echo "Go verify reported mismatch; confirming with Python (reference)..."
            python3 "$GITHUB_WORKSPACE/verifier/verify.py" /tmp/receipt.json
          fi

      - name: Go client example
        run: cd examples/go && go run ./cmd/client

      # Always print mock server log on failure for fast diagnosis.
      - name: Show mock server logs
        if: failure()
        run: cat /tmp/mock_rna.log || true
