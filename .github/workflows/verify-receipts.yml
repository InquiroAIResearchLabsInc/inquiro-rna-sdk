# Push/PR: deterministic — local mock server + verifier (no Render cold start).
name: Verify RNA Receipts (mock)
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Block unresolved merge conflict markers
        run: |
          if git grep -nE '^(<<<<<<<|=======|>>>>>>>)' -- '*.py' '*.js' '*.yml' '*.md'; then
            echo "ERROR: merge conflict markers found in tracked sources"
            exit 1
          fi
      - uses: actions/setup-python@0b93645e9fea7318ca6999aeacba3ba4ee75398 # v5.3.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Start mock MCP server
        run: |
          cd "${{ github.workspace }}"
          nohup python mock/mock_server.py > /tmp/mock_rna.log 2>&1 &
          echo $! > /tmp/mock_rna.pid
          sleep 3
          curl -sf http://127.0.0.1:8000/health | python -m json.tool
      - name: Generate receipt from mock
        run: |
          curl -s -X POST http://127.0.0.1:8000/mcp \
            -H "Content-Type: application/json" \
            -d @payloads/identity_verified.json > /tmp/receipt.json
          echo "Receipt generated:"
          python -m json.tool < /tmp/receipt.json
      - name: Verify receipt integrity
        run: python verifier/verify.py /tmp/receipt.json
      - name: Verify all sample payloads
        run: |
          set -e
          for payload in payloads/*.json; do
            echo "Testing $payload..."
            curl -s -X POST http://127.0.0.1:8000/mcp \
              -H "Content-Type: application/json" \
              -d @"$payload" > /tmp/test_receipt.json
            python verifier/verify.py /tmp/test_receipt.json
          done
      - uses: actions/setup-go@cdcb38852b2aeb4e2b8bcf010ce6649126afe1d8 # v5.3.0
        with:
          go-version: "1.22"
      - name: Go mod download
        env:
          INQUIRO_ROOT: ${{ github.workspace }}
        run: |
          cd examples/go
          go mod download
      - name: Go verify_receipt (zeebo/blake3; fall back to Python if mismatch)
        env:
          INQUIRO_ROOT: ${{ github.workspace }}
        run: |
          cd examples/go
          if ! go run ./cmd/verify-receipt /tmp/receipt.json; then
            echo "Go verify reported mismatch; confirming with Python (reference)..."
            python3 "$GITHUB_WORKSPACE/verifier/verify.py" /tmp/receipt.json
          fi
      - name: Go client example
        run: |
          cd examples/go
          go run ./cmd/client
