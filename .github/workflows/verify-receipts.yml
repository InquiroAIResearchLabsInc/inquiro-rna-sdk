name: Verify RNA Receipts

on: [push, pull_request]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests blake3 cryptography

      - name: Test live API connectivity
        run: |
          echo "Testing live API..."
          curl -sf -X POST https://aiflightrecorder.onrender.com/mcp \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","id":"1","method":"tools/list","params":{}}' \
            -o /tmp/tools.json
          echo "Tools available:"
          cat /tmp/tools.json | python -m json.tool

      - name: Generate and verify receipt for each payload
        run: |
          set -e
          LIVE=https://aiflightrecorder.onrender.com/mcp
          for payload in payloads/*.json; do
            echo "=== Testing $payload ==="
            python3 scripts/submit_payload.py "$LIVE" "$payload" /tmp/receipt.json
            echo "Receipt:"
            cat /tmp/receipt.json | python -m json.tool
            python3 scripts/merge_attestation_response.py "$payload" /tmp/receipt.json /tmp/merged.json
            echo "Verifying..."
            python verifier/verify.py /tmp/merged.json
            echo "PASSED: $payload"
          done

      - name: Verify tamper detection
        run: |
          echo "Testing tamper detection..."
          python examples/python/verify_receipt.py --tamper-test
