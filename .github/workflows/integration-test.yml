name: Integration Test (Mock Server)

on: [push, pull_request]

jobs:
  mock-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Block unresolved merge conflict markers
        run: |
          if git grep -nE '^(<<<<<<<|=======|>>>>>>>)' -- '*.py' '*.js' '*.yml' '*.md'; then
            echo "ERROR: merge conflict markers found in tracked sources"
            exit 1
          fi

      - uses: actions/setup-python@0b93645e9fea7318ca6999aeacba3ba4ee75398 # v5.3.0
        with:
          python-version: "3.12"

      - name: Install mock server dependencies
        run: |
          pip install requests
          pip install -r mock/requirements.txt

      - name: Start mock server
        run: |
          cd mock && python mock_server.py &
          sleep 3
          echo "Mock server started"

      - name: Test all tools against mock
        run: |
          for script in examples/curl/*.sh; do
            echo "=== Running $script against mock ==="
            RNA_BASE_URL=http://127.0.0.1:8000/mcp bash "$script"
          done

      - name: Test session-based verify
        run: |
          echo "Testing mock session verify..."
          python -c "
          import json
          import pathlib
          import requests

          root = pathlib.Path('.')
          payload = json.loads((root / 'payloads' / 'identity_verified.json').read_text(encoding='utf-8'))
          base = 'http://127.0.0.1:8000/mcp'
          r = requests.post(base, json={
              'jsonrpc': '2.0', 'id': '1', 'method': 'tools/call',
              'params': {'name': 'submit_attestation', 'arguments': {'payload': payload}},
          }, timeout=30)
          r.raise_for_status()
          rec = r.json()['result']['receipt']
          receipt_hash = rec['sha256'] + ':' + rec['blake3']
          print(f'Submitted. Hash prefix: {receipt_hash[:16]}...')
          r2 = requests.post(base, json={
              'jsonrpc': '2.0', 'id': '2', 'method': 'tools/call',
              'params': {'name': 'verify_receipt', 'arguments': {'receipt_hash': receipt_hash}},
          }, timeout=30)
          r2.raise_for_status()
          result = r2.json()['result']
          assert result.get('valid') is True, f'Expected valid: True, got {result}'
          print('Session verify: PASSED')
          r3 = requests.post(base, json={
              'jsonrpc': '2.0', 'id': '3', 'method': 'tools/call',
              'params': {'name': 'verify_receipt',
                        'arguments': {'receipt_hash': 'a' * 64 + ':' + 'a' * 64}},
          }, timeout=30)
          r3.raise_for_status()
          result3 = r3.json()['result']
          assert result3.get('valid') is False, f'Expected valid: False, got {result3}'
          print('Unknown hash returns False: PASSED')
          "
