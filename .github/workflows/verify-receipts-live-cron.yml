# Scheduled: hits live Render endpoint to prove production + format on a warm or cold server.
# Requires LIVE_API_KEY secret set in repo Settings → Secrets → Actions.
name: Verify RNA Receipts (live API)
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  verify-live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Block unresolved merge conflict markers
        run: |
          if git grep -nE '^(<<<<<<<|=======|>>>>>>>)' -- '*.py' '*.js' '*.yml' '*.md'; then
            echo "ERROR: merge conflict markers found in tracked sources"
            exit 1
          fi
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.12"
      - uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b # v5.4.0
        with:
          go-version: "1.22"
          cache: false
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pre-flight health check
        env:
          LIVE_URL: https://aiflightrecorder.onrender.com
          LIVE_API_KEY: ${{ secrets.LIVE_API_KEY }}
        run: |
          if [ -z "$LIVE_API_KEY" ]; then
            echo "::warning::LIVE_API_KEY secret is not set — requests will be unauthenticated"
          fi
          echo "Checking $LIVE_URL/health ..."
          auth_header=""
          if [ -n "$LIVE_API_KEY" ]; then
            auth_header="X-Api-Key: $LIVE_API_KEY"
          fi
          http_code=$(curl -sS -o /tmp/health.json -w "%{http_code}" --max-time 15 \
            ${auth_header:+-H "$auth_header"} \
            "$LIVE_URL/health" || echo "000")
          echo "Health status: HTTP $http_code"
          cat /tmp/health.json || true
          if [ "$http_code" = "403" ]; then
            echo "::error::403 Forbidden on /health — LIVE_API_KEY may be wrong, missing, or the Render service is set to Private. Check repo Settings → Secrets → Actions."
            exit 1
          fi
          if [ "$http_code" != "200" ]; then
            echo "::warning::Health check returned HTTP $http_code — proceeding anyway (may be cold start)"
          fi

      - name: Generate test receipt from live API
        env:
          LIVE_URL: https://aiflightrecorder.onrender.com/mcp
          LIVE_API_KEY: ${{ secrets.LIVE_API_KEY }}
        run: |
          echo "POSTing identity_verified payload to $LIVE_URL ..."
          auth_header=""
          if [ -n "$LIVE_API_KEY" ]; then
            auth_header="X-Api-Key: $LIVE_API_KEY"
          fi
          # Wrap payload in JSON-RPC submit_attestation envelope (matches
          # README contract; live API expects JSON-RPC, not raw payload).
          python3 -c "
          import json, pathlib
          payload = json.loads(pathlib.Path('payloads/identity_verified.json').read_text())
          rpc = {'jsonrpc':'2.0','id':'1','method':'tools/call',
                 'params':{'name':'submit_attestation','arguments':{'payload':payload}}}
          pathlib.Path('/tmp/rpc_request.json').write_text(json.dumps(rpc))
          " || { echo "::error::Failed to build JSON-RPC request body"; exit 1; }

          attempt=0
          ok=0
          while [ $attempt -lt 5 ]; do
            http_code=$(curl -sS -o /tmp/receipt.json -w "%{http_code}" --max-time 30 \
              ${auth_header:+-H "$auth_header"} \
              -H "Content-Type: application/json" \
              -X POST "$LIVE_URL" \
              -d @/tmp/rpc_request.json || echo "000")
            if [ "$http_code" = "200" ] && [ -s /tmp/receipt.json ]; then
              ok=1
              break
            fi
            attempt=$((attempt + 1))
            if [ "$http_code" = "403" ]; then
              echo "::error::403 Forbidden — check LIVE_API_KEY secret and Render service visibility"
              cat /tmp/receipt.json || true
              exit 1
            fi
            echo "Attempt $attempt failed (HTTP $http_code), retrying in 15s..."
            cat /tmp/receipt.json || true
            sleep 15
          done
          if [ "$ok" != "1" ]; then
            echo "::error::Live API did not return 200 after $attempt attempts (last HTTP $http_code)"
            cat /tmp/receipt.json || true
            exit 1
          fi
          echo "Live API response (HTTP $http_code):"
          python -m json.tool < /tmp/receipt.json || cat /tmp/receipt.json

      - name: Verify receipt integrity
        run: python verifier/verify.py /tmp/receipt.json

      - name: Go mod download
        env:
          INQUIRO_ROOT: ${{ github.workspace }}
        run: cd examples/go && go mod download

      - name: Go verify_receipt (zeebo; fall back to Python on mismatch)
        env:
          INQUIRO_ROOT: ${{ github.workspace }}
        run: |
          cd examples/go
          if ! go run ./cmd/verify-receipt /tmp/receipt.json; then
            echo "Go verify reported mismatch; confirming with Python (reference)..."
            python3 "$GITHUB_WORKSPACE/verifier/verify.py" /tmp/receipt.json
          fi

      - name: Verify all sample payloads (live)
        env:
          LIVE_API_KEY: ${{ secrets.LIVE_API_KEY }}
        run: |
          set -e
          auth_header=""
          if [ -n "$LIVE_API_KEY" ]; then
            auth_header="X-Api-Key: $LIVE_API_KEY"
          fi
          for payload in payloads/*.json; do
            echo "Testing $payload..."
            python3 -c "
          import json, pathlib, sys
          p = json.loads(pathlib.Path(sys.argv[1]).read_text())
          rpc = {'jsonrpc':'2.0','id':'1','method':'tools/call',
                 'params':{'name':'submit_attestation','arguments':{'payload':p}}}
          pathlib.Path('/tmp/rpc_request.json').write_text(json.dumps(rpc))
          " "$payload"
            http_code=$(curl -sS -o /tmp/test_receipt.json -w "%{http_code}" --max-time 30 \
              ${auth_header:+-H "$auth_header"} \
              -H "Content-Type: application/json" \
              -X POST https://aiflightrecorder.onrender.com/mcp \
              -d @/tmp/rpc_request.json || echo "000")
            if [ "$http_code" != "200" ]; then
              echo "::error::HTTP $http_code for $payload"
              cat /tmp/test_receipt.json || true
              exit 1
            fi
            python verifier/verify.py /tmp/test_receipt.json
          done
