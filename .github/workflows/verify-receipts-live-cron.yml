# Scheduled: hits live Render endpoint to prove production + format on a warm or cold server.
name: Verify RNA Receipts (live API)
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  verify-live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Generate test receipt from live API (JSON-RPC)
        env:
          LIVE_URL: https://aiflightrecorder.onrender.com/mcp
        run: |
          set -e
          attempt=0
          ok=0
          while [ $attempt -lt 5 ]; do
            if python3 scripts/submit_payload.py "$LIVE_URL" payloads/identity_verified.json /tmp/receipt.json; then
              ok=1
              break
            fi
            attempt=$((attempt + 1))
            echo "Attempt $attempt failed, retrying in 30s..."
            sleep 30
          done
          if [ "$ok" != "1" ]; then
            echo "Live API did not succeed after retries."
            exit 1
          fi
          echo "Receipt generated:"
          python -m json.tool < /tmp/receipt.json
      - name: Merge and verify receipt integrity
        run: |
          python3 scripts/merge_attestation_response.py payloads/identity_verified.json /tmp/receipt.json /tmp/merged.json
          python verifier/verify.py /tmp/merged.json
      - name: Go mod download
        env:
          INQUIRO_ROOT: ${{ github.workspace }}
        run: |
          cd examples/go
          go mod download
      - name: Go verify_receipt
        env:
          INQUIRO_ROOT: ${{ github.workspace }}
        run: |
          cd examples/go
          go run verify_receipt.go /tmp/merged.json
      - name: Verify all sample payloads (live)
        run: |
          set -e
          LIVE=https://aiflightrecorder.onrender.com/mcp
          for payload in payloads/*.json; do
            echo "Testing $payload..."
            python3 scripts/submit_payload.py "$LIVE" "$payload" /tmp/test_receipt.json
            python3 scripts/merge_attestation_response.py "$payload" /tmp/test_receipt.json /tmp/merged_all.json
            python verifier/verify.py /tmp/merged_all.json
          done
