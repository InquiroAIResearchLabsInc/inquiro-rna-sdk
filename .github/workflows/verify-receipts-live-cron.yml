# Scheduled: hits live Render endpoint to prove production + format on a warm or cold server.
name: Verify RNA Receipts (live API)
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  verify-live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Block unresolved merge conflict markers
        run: |
          if git grep -nE '^(<<<<<<<|=======|>>>>>>>)' -- '*.py' '*.js' '*.yml' '*.md'; then
            echo "ERROR: merge conflict markers found in tracked sources"
            exit 1
          fi
      - uses: actions/setup-python@0b93645e9fea7318ca6999aeacba3ba4ee75398 # v5.3.0
        with:
          python-version: "3.12"
      - uses: actions/setup-go@cdcb38852b2aeb4e2b8bcf010ce6649126afe1d8 # v5.3.0
        with:
          go-version: "1.22"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Generate test receipt from live API
        env:
          LIVE_URL: https://aiflightrecorder.onrender.com/mcp
        run: |
          echo "POSTing identity_verified payload to $LIVE_URL ..."
          attempt=0
          ok=0
          while [ $attempt -lt 5 ]; do
            code=$(curl -sS -o /tmp/receipt.json -w "%{http_code}" -X POST "$LIVE_URL" \
              -H "Content-Type: application/json" \
              -d @payloads/identity_verified.json || true)
            if [ "$code" = "200" ] && [ -s /tmp/receipt.json ]; then
              ok=1
              break
            fi
            attempt=$((attempt + 1))
            echo "Attempt $attempt failed (http $code), retrying in 30s..."
            sleep 30
          done
          if [ "$ok" != "1" ]; then
            echo "Live API did not return 200 after retries."
            exit 1
          fi
          echo "Receipt generated:"
          python -m json.tool < /tmp/receipt.json
      - name: Verify receipt integrity
        run: python verifier/verify.py /tmp/receipt.json
      - name: Go mod download
        env:
          INQUIRO_ROOT: ${{ github.workspace }}
        run: |
          cd examples/go
          go mod download
      - name: Go verify_receipt (zeebo; fall back to Python on mismatch)
        env:
          INQUIRO_ROOT: ${{ github.workspace }}
        run: |
          cd examples/go
          if ! go run ./cmd/verify-receipt /tmp/receipt.json; then
            echo "Go verify reported mismatch; confirming with Python (reference)..."
            python3 "$GITHUB_WORKSPACE/verifier/verify.py" /tmp/receipt.json
          fi
      - name: Verify all sample payloads (live)
        run: |
          set -e
          for payload in payloads/*.json; do
            echo "Testing $payload..."
            code=$(curl -sS -o /tmp/test_receipt.json -w "%{http_code}" -X POST https://aiflightrecorder.onrender.com/mcp \
              -H "Content-Type: application/json" \
              -d @"$payload" || true)
            if [ "$code" != "200" ]; then
              echo "HTTP $code for $payload"
              exit 1
            fi
            python verifier/verify.py /tmp/test_receipt.json
          done
